<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — AE Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#E8ECF0;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(0,240,255,.06),transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(255,45,155,.05),transparent 60%);pointer-events:none}
.login-card{background:#0A0A14;border:1px solid rgba(0,240,255,.18);border-radius:12px;padding:40px;width:100%;max-width:380px;text-align:center;box-shadow:0 0 40px rgba(0,240,255,.05);position:relative}
.login-title{font-family:'Bangers',cursive;font-size:32px;color:#00F0FF;letter-spacing:2px;margin-bottom:8px;text-shadow:0 0 14px rgba(0,240,255,.4)}
.login-sub{font-size:13px;color:#666;margin-bottom:28px}
.login-input{width:100%;background:rgba(0,240,255,.03);border:1px solid rgba(0,240,255,.15);border-radius:8px;padding:14px 16px;color:#E8ECF0;font-family:inherit;font-size:15px;outline:none;margin-bottom:16px;text-align:center;letter-spacing:2px}
.login-input:focus{border-color:#00F0FF;box-shadow:0 0 0 3px rgba(0,240,255,.1),0 0 12px rgba(0,240,255,.15)}
.login-btn{width:100%;padding:14px;border-radius:8px;border:none;background:linear-gradient(135deg,#FF2D9B,#D4006A);color:#fff;font-family:'Bangers',cursive;font-size:20px;letter-spacing:1.5px;cursor:pointer;transition:all .2s}
.login-btn:hover{box-shadow:0 4px 24px rgba(255,45,155,.35),0 0 40px rgba(255,45,155,.1);transform:translateY(-1px)}
</style>
</head>
<body>
<form class="login-card" method="POST" action="/admin/auth">
  <div class="login-title">Admin Access</div>
  <div class="login-sub">Enter your admin key to continue</div>
  <input class="login-input" type="password" name="key" placeholder="Admin Key" autofocus required>
  <button class="login-btn" type="submit">Enter Dashboard</button>
</form>
</body>
</html>
